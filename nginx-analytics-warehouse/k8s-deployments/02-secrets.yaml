apiVersion: v1
kind: Secret
metadata:
  name: nginx-analytics-secrets
  namespace: nginx-analytics
type: Opaque
stringData:
  # ClickHouse凭据
  clickhouse-user: "analytics_user"
  clickhouse-password: "analytics_password_change_in_prod"
  clickhouse-database: "nginx_analytics"

  # Redis凭据
  redis-password: "redis_password"

  # Grafana凭据
  grafana-admin-user: "admin"
  grafana-admin-password: "admin123"

  # DataEase MySQL凭据
  dataease-mysql-root-password: "Password123@mysql"
  dataease-mysql-database: "dataease"
  dataease-mysql-user: "dataease"
  dataease-mysql-password: "dataease_password_123"

---
# DataEase应用配置Secret
apiVersion: v1
kind: Secret
metadata:
  name: dataease-app-secret
  namespace: nginx-analytics
type: Opaque
stringData:
  # DataEase应用配置
  application.properties: |
    spring.datasource.url=jdbc:mysql://dataease-mysql-service:3306/dataease?autoReconnect=false&useUnicode=true&characterEncoding=UTF-8&characterSetResults=UTF-8&zeroDateTimeBehavior=convertToNull&useSSL=false
    spring.datasource.username=root
    spring.datasource.password=Password123@mysql
    spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
