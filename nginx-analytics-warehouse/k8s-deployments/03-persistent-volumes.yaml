# ==========================================
# PersistentVolumes - 使用hostPath固定在worker-148
# 注意：WSL路径映射 D:\ -> /mnt/d/
# ==========================================

---
# ClickHouse数据卷 - 50GB
apiVersion: v1
kind: PersistentVolume
metadata:
  name: clickhouse-data-pv
  labels:
    app: clickhouse
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  hostPath:
    path: /mnt/d/soft_work/k8s-data/clickhouse-data
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - worker-148

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clickhouse-data-pvc
  namespace: nginx-analytics
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: local-storage
  selector:
    matchLabels:
      app: clickhouse

