apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-analytics-config
  namespace: nginx-analytics
data:
  # ClickHouse配置
  clickhouse-config.xml: |
    <clickhouse>
      <listen_host>0.0.0.0</listen_host>
      <listen_host>::</listen_host>
      <http_port>8123</http_port>
      <tcp_port>9000</tcp_port>
      <max_connections>4096</max_connections>
      <max_concurrent_queries>100</max_concurrent_queries>
      <max_memory_usage>10000000000</max_memory_usage>
      <timezone>Asia/Shanghai</timezone>
    </clickhouse>

  # Redis配置
  redis.conf: |
    appendonly yes
    appendfsync everysec
    save 900 1
    save 300 10
    save 60 10000
    maxmemory 2gb
    maxmemory-policy allkeys-lru
    timeout 300

  # Grafana数据源配置
  clickhouse-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: ClickHouse
        type: grafana-clickhouse-datasource
        access: proxy
        url: http://clickhouse-service:8123
        database: nginx_analytics
        user: analytics_user
        jsonData:
          defaultDatabase: nginx_analytics
          port: 9000
          server: clickhouse-service
          username: analytics_user
        secureJsonData:
          password: analytics_password_change_in_prod
        isDefault: true
        editable: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dataease-config
  namespace: nginx-analytics
data:
  # DataEase MySQL配置
  my.cnf: |
    [mysqld]
    character-set-server=utf8mb4
    collation-server=utf8mb4_general_ci
    default-time-zone='+08:00'
    max_connections=1000
    max_allowed_packet=64M
    innodb_buffer_pool_size=512M
    innodb_log_file_size=256M

  # DataEase环境变量配置
  mysql.env: |
    MYSQL_ROOT_PASSWORD=Password123@mysql
    MYSQL_DATABASE=dataease
    TZ=Asia/Shanghai
