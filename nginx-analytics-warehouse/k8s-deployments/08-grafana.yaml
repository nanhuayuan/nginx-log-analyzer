# ==========================================
# Grafana Deployment - 性能监控可视化
# 版本: grafana/grafana:latest
# 固定节点: worker-148
# ==========================================

---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: nginx-analytics
  labels:
    app: grafana
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: grafana

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: nginx-analytics
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      # 固定在worker-148节点
      nodeSelector:
        kubernetes.io/hostname: worker-148

      # 等待ClickHouse就绪
      initContainers:
      - name: wait-for-clickhouse
        image: busybox:1.35
        command:
          - sh
          - -c
          - |
            until nc -z clickhouse-service 8123; do
              echo "Waiting for ClickHouse..."
              sleep 5
            done
            echo "ClickHouse is ready!"

      containers:
      - name: grafana
        image: grafana/grafana:latest
        imagePullPolicy: IfNotPresent

        ports:
        - name: http
          containerPort: 3000
          protocol: TCP

        env:
        - name: GF_SERVER_HTTP_ADDR
          value: "0.0.0.0"
        - name: GF_SECURITY_ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: nginx-analytics-secrets
              key: grafana-admin-user
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nginx-analytics-secrets
              key: grafana-admin-password
        - name: GF_INSTALL_PLUGINS
          value: "grafana-clickhouse-datasource"
        - name: TZ
          value: "Asia/Shanghai"

        volumeMounts:
        - name: grafana-data
          mountPath: /var/lib/grafana
        - name: grafana-datasources
          mountPath: /etc/grafana/provisioning/datasources
          readOnly: true

        # 资源限制
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"

        # 健康检查
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10

        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10

      volumes:
      - name: grafana-data
        persistentVolumeClaim:
          claimName: grafana-data-pvc
      - name: grafana-datasources
        configMap:
          name: nginx-analytics-config
          items:
          - key: clickhouse-datasource.yaml
            path: clickhouse-datasource.yaml
